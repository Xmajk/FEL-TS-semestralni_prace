spring.application.name=TS_semestralni_prace
server.port=8080

# Thymeleaf
spring.thymeleaf.cache=false
spring.thymeleaf.encoding=UTF-8

# Disable Spring Security's auto-generated password
logging.level.org.springframework.security=WARN

# Data directory (relative to working dir, created automatically)
app.data.dir=./data

# Minimum order total (in CZK)
app.order.min-total=50
