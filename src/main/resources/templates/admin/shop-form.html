<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      xmlns:sec="http://www.thymeleaf.org/extras/spring-security">
<head th:replace="~{fragments/layout :: head('Admin — Zmrzlinárna')}"></head>
<body class="d-flex flex-column min-vh-100">

<nav th:replace="~{fragments/layout :: navbar}"></nav>

<div class="container-fluid py-4">
    <div class="row">
        <div class="col-md-2">
            <div class="card border-0 shadow-sm rounded-4 sticky-top" style="top: 80px;">
                <div class="card-body p-3">
                    <h6 class="text-muted small fw-bold text-uppercase px-2 mb-3">Admin panel</h6>
                    <nav class="nav flex-column gap-1">
                        <a th:href="@{/admin}" class="nav-link admin-nav rounded-3 px-3 py-2">
                            <i class="bi bi-speedometer2 me-2"></i>Dashboard
                        </a>
                        <a th:href="@{/admin/shops}" class="nav-link admin-nav active rounded-3 px-3 py-2">
                            <i class="bi bi-shop me-2"></i>Zmrzlinárny
                        </a>
                        <a th:href="@{/admin/products}" class="nav-link admin-nav rounded-3 px-3 py-2">
                            <i class="bi bi-grid me-2"></i>Produkty
                        </a>
                        <a th:href="@{/admin/orders}" class="nav-link admin-nav rounded-3 px-3 py-2">
                            <i class="bi bi-receipt me-2"></i>Objednávky
                        </a>
                        <hr class="my-2">
                        <a th:href="@{/}" class="nav-link admin-nav rounded-3 px-3 py-2 text-muted">
                            <i class="bi bi-arrow-left me-2"></i>Zpět na web
                        </a>
                    </nav>
                </div>
            </div>
        </div>

        <div class="col-md-10">
            <div class="mb-4">
                <nav aria-label="breadcrumb">
                    <ol class="breadcrumb">
                        <li class="breadcrumb-item"><a th:href="@{/admin/shops}" class="text-decoration-none">Zmrzlinárny</a></li>
                        <li class="breadcrumb-item active" th:text="${shop.id != null and !shop.id.blank} ? 'Upravit' : 'Nová zmrzlinárna'">Formulář</li>
                    </ol>
                </nav>
                <h2 class="fw-bold" th:text="${shop.id != null and !shop.id.blank} ? 'Upravit zmrzlinárnu' : 'Nová zmrzlinárna'">Zmrzlinárna</h2>
            </div>

            <div class="card border-0 shadow-sm rounded-4">
                <div class="card-body p-4 p-md-5">
                    <form th:action="@{/admin/shops/save}" method="post" th:object="${shop}">
                        <input type="hidden" th:field="*{id}">

                        <div class="row g-4">
                            <div class="col-md-8">
                                <label class="form-label fw-semibold">Název zmrzlinárny *</label>
                                <input type="text" th:field="*{name}" class="form-control" required
                                       placeholder="Zmrzlinárna Centrum">
                            </div>
                            <div class="col-md-4">
                                <label class="form-label fw-semibold">Emoji ikona</label>
                                <input type="text" th:field="*{imageEmoji}" class="form-control"
                                       placeholder="🍦">
                                <div class="form-text">Emoji reprezentující zmrzlinárnu (př. 🍦 🍨 🍧)</div>
                            </div>
                            <div class="col-md-8">
                                <label class="form-label fw-semibold">Ulice a číslo popisné *</label>
                                <input type="text" th:field="*{address}" class="form-control" required
                                       placeholder="Václavské náměstí 1">
                            </div>
                            <div class="col-md-4">
                                <label class="form-label fw-semibold">Město *</label>
                                <input type="text" th:field="*{city}" class="form-control" required
                                       placeholder="Praha">
                            </div>
                            <div class="col-12">
                                <label class="form-label fw-semibold">Popis</label>
                                <textarea th:field="*{description}" class="form-control" rows="3"
                                          placeholder="Stručný popis zmrzlinárny..."></textarea>
                            </div>
                            <div class="col-12">
                                <div class="form-check form-switch">
                                    <input class="form-check-input" type="checkbox" role="switch"
                                           th:field="*{active}" id="active">
                                    <label class="form-check-label fw-semibold" for="active">Aktivní (zobrazena zákazníkům)</label>
                                </div>
                            </div>
                        </div>

                        <div class="d-flex gap-3 mt-5">
                            <a th:href="@{/admin/shops}" class="btn btn-outline-secondary rounded-pill px-4">
                                <i class="bi bi-arrow-left me-2"></i>Zpět
                            </a>
                            <button type="submit" class="btn btn-ice rounded-pill px-5">
                                <i class="bi bi-check-circle me-2"></i>Uložit
                            </button>
                        </div>
                    </form>
                </div>
            </div>
        </div>
    </div>
</div>

<footer th:replace="~{fragments/layout :: footer}"></footer>
<div th:replace="~{fragments/layout :: scripts}"></div>
</body>
</html>
