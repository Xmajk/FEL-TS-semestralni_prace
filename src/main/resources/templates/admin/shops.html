<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      xmlns:sec="http://www.thymeleaf.org/extras/spring-security">
<head th:replace="~{fragments/layout :: head('Admin — Zmrzlinárny')}"></head>
<body class="d-flex flex-column min-vh-100">

<nav th:replace="~{fragments/layout :: navbar}"></nav>

<div class="container-fluid py-4">
    <div class="row">
        <div class="col-md-2">
            <div class="card border-0 shadow-sm rounded-4 sticky-top" style="top: 80px;">
                <div class="card-body p-3">
                    <h6 class="text-muted small fw-bold text-uppercase px-2 mb-3">Admin panel</h6>
                    <nav class="nav flex-column gap-1">
                        <a th:href="@{/admin}" class="nav-link admin-nav rounded-3 px-3 py-2">
                            <i class="bi bi-speedometer2 me-2"></i>Dashboard
                        </a>
                        <a th:href="@{/admin/shops}" class="nav-link admin-nav active rounded-3 px-3 py-2">
                            <i class="bi bi-shop me-2"></i>Zmrzlinárny
                        </a>
                        <a th:href="@{/admin/products}" class="nav-link admin-nav rounded-3 px-3 py-2">
                            <i class="bi bi-grid me-2"></i>Produkty
                        </a>
                        <a th:href="@{/admin/orders}" class="nav-link admin-nav rounded-3 px-3 py-2">
                            <i class="bi bi-receipt me-2"></i>Objednávky
                        </a>
                        <hr class="my-2">
                        <a th:href="@{/}" class="nav-link admin-nav rounded-3 px-3 py-2 text-muted">
                            <i class="bi bi-arrow-left me-2"></i>Zpět na web
                        </a>
                    </nav>
                </div>
            </div>
        </div>

        <div class="col-md-10">
            <div class="d-flex justify-content-between align-items-center mb-4">
                <h2 class="fw-bold mb-0">Zmrzlinárny</h2>
                <a th:href="@{/admin/shops/new}" class="btn btn-ice rounded-pill px-4">
                    <i class="bi bi-plus-circle me-2"></i>Přidat zmrzlinárnu
                </a>
            </div>

            <div th:if="${success}" class="alert alert-success alert-dismissible fade show rounded-3">
                <i class="bi bi-check-circle me-2"></i><span th:text="${success}"></span>
                <button type="button" class="btn-close" data-bs-dismiss="alert"></button>
            </div>

            <div class="card border-0 shadow-sm rounded-4">
                <div class="card-body p-0">
                    <div th:if="${shops.empty}" class="text-center py-5 text-muted">
                        <i class="bi bi-shop fs-1 mb-3 d-block"></i>Žádné zmrzlinárny zatím nepřidány.
                    </div>
                    <div class="table-responsive" th:if="${!shops.empty}">
                        <table class="table table-hover align-middle mb-0">
                            <thead class="table-light">
                            <tr>
                                <th class="ps-4">Emoji</th>
                                <th>Název</th>
                                <th>Adresa</th>
                                <th>Město</th>
                                <th>Status</th>
                                <th>Produkty</th>
                                <th class="text-end pe-4">Akce</th>
                            </tr>
                            </thead>
                            <tbody>
                            <tr th:each="shop : ${shops}">
                                <td class="ps-4 fs-4" th:text="${shop.imageEmoji}">🍦</td>
                                <td class="fw-semibold" th:text="${shop.name}">Název</td>
                                <td class="text-muted" th:text="${shop.address}">Adresa</td>
                                <td th:text="${shop.city}">Město</td>
                                <td>
                                    <span th:if="${shop.active}" class="badge bg-success rounded-pill">Aktivní</span>
                                    <span th:if="${!shop.active}" class="badge bg-secondary rounded-pill">Neaktivní</span>
                                </td>
                                <td>
                                    <a th:href="@{/admin/products(shopId=${shop.id})}"
                                       class="badge bg-light text-dark text-decoration-none">
                                        <i class="bi bi-grid me-1"></i>Produkty
                                    </a>
                                </td>
                                <td class="text-end pe-4">
                                    <div class="btn-group btn-group-sm">
                                        <a th:href="@{/shop/{id}(id=${shop.id})}"
                                           class="btn btn-outline-secondary rounded-start-pill" target="_blank"
                                           title="Zobrazit">
                                            <i class="bi bi-eye"></i>
                                        </a>
                                        <a th:href="@{/admin/shops/edit/{id}(id=${shop.id})}"
                                           class="btn btn-outline-primary" title="Upravit">
                                            <i class="bi bi-pencil"></i>
                                        </a>
                                        <form th:action="@{/admin/shops/delete/{id}(id=${shop.id})}" method="post"
                                              onsubmit="return confirm('Opravdu chcete smazat tuto zmrzlinárnu?')">
                                            <button type="submit" class="btn btn-outline-danger rounded-end-pill" title="Smazat">
                                                <i class="bi bi-trash"></i>
                                            </button>
                                        </form>
                                    </div>
                                </td>
                            </tr>
                            </tbody>
                        </table>
                    </div>
                </div>
            </div>
        </div>
    </div>
</div>

<footer th:replace="~{fragments/layout :: footer}"></footer>
<div th:replace="~{fragments/layout :: scripts}"></div>
</body>
</html>
