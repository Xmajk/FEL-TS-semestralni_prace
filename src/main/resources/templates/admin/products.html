<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      xmlns:sec="http://www.thymeleaf.org/extras/spring-security">
<head th:replace="~{fragments/layout :: head('Admin — Produkty')}"></head>
<body class="d-flex flex-column min-vh-100">

<nav th:replace="~{fragments/layout :: navbar}"></nav>

<div class="container-fluid py-4">
    <div class="row">
        <div class="col-md-2">
            <div class="card border-0 shadow-sm rounded-4 sticky-top" style="top: 80px;">
                <div class="card-body p-3">
                    <h6 class="text-muted small fw-bold text-uppercase px-2 mb-3">Admin panel</h6>
                    <nav class="nav flex-column gap-1">
                        <a th:href="@{/admin}" class="nav-link admin-nav rounded-3 px-3 py-2">
                            <i class="bi bi-speedometer2 me-2"></i>Dashboard
                        </a>
                        <a th:href="@{/admin/shops}" class="nav-link admin-nav rounded-3 px-3 py-2">
                            <i class="bi bi-shop me-2"></i>Zmrzlinárny
                        </a>
                        <a th:href="@{/admin/products}" class="nav-link admin-nav active rounded-3 px-3 py-2">
                            <i class="bi bi-grid me-2"></i>Produkty
                        </a>
                        <a th:href="@{/admin/orders}" class="nav-link admin-nav rounded-3 px-3 py-2">
                            <i class="bi bi-receipt me-2"></i>Objednávky
                        </a>
                        <hr class="my-2">
                        <a th:href="@{/}" class="nav-link admin-nav rounded-3 px-3 py-2 text-muted">
                            <i class="bi bi-arrow-left me-2"></i>Zpět na web
                        </a>
                    </nav>
                </div>
            </div>
        </div>

        <div class="col-md-10">
            <div class="d-flex justify-content-between align-items-center mb-4">
                <h2 class="fw-bold mb-0">Produkty</h2>
                <a th:href="@{/admin/products/new}" class="btn btn-ice rounded-pill px-4">
                    <i class="bi bi-plus-circle me-2"></i>Přidat produkt
                </a>
            </div>

            <div th:if="${success}" class="alert alert-success alert-dismissible fade show rounded-3">
                <i class="bi bi-check-circle me-2"></i><span th:text="${success}"></span>
                <button type="button" class="btn-close" data-bs-dismiss="alert"></button>
            </div>

            <div class="card border-0 shadow-sm rounded-4">
                <div class="card-body p-0">
                    <div th:if="${products.empty}" class="text-center py-5 text-muted">
                        <i class="bi bi-grid fs-1 mb-3 d-block"></i>Žádné produkty zatím nepřidány.
                    </div>
                    <div class="table-responsive" th:if="${!products.empty}">
                        <table class="table table-hover align-middle mb-0">
                            <thead class="table-light">
                            <tr>
                                <th class="ps-4">Název</th>
                                <th>Příchuť</th>
                                <th>Zmrzlinárna</th>
                                <th>Cena</th>
                                <th>Sklad</th>
                                <th>Status</th>
                                <th class="text-end pe-4">Akce</th>
                            </tr>
                            </thead>
                            <tbody>
                            <tr th:each="product : ${products}">
                                <td class="ps-4">
                                    <div class="fw-semibold" th:text="${product.name}">Produkt</div>
                                    <small class="text-muted" th:text="${#strings.abbreviate(product.description, 40)}">Popis</small>
                                </td>
                                <td>
                                    <span class="badge bg-ice-soft text-ice-dark px-2 rounded-pill"
                                          th:text="${product.flavor}">Příchuť</span>
                                </td>
                                <td>
                                    <span th:each="shop : ${shops}"
                                          th:if="${shop.id == product.shopId}"
                                          th:text="${shop.name}" class="text-muted small">Zmrzlinárna</span>
                                </td>
                                <td class="fw-semibold" th:text="${#numbers.formatDecimal(product.price, 1, 2)} + ' Kč'">0 Kč</td>
                                <td>
                                    <span th:classappend="${product.stockQuantity <= 0} ? 'text-danger fw-bold' : (${product.stockQuantity <= 10} ? 'text-warning fw-bold' : 'text-success')"
                                          th:text="${product.stockQuantity} + ' ks'">0 ks</span>
                                </td>
                                <td>
                                    <span th:if="${product.available}" class="badge bg-success rounded-pill">Dostupný</span>
                                    <span th:if="${!product.available}" class="badge bg-danger rounded-pill">Nedostupný</span>
                                </td>
                                <td class="text-end pe-4">
                                    <div class="btn-group btn-group-sm">
                                        <a th:href="@{/admin/products/edit/{id}(id=${product.id})}"
                                           class="btn btn-outline-primary rounded-start-pill" title="Upravit">
                                            <i class="bi bi-pencil"></i>
                                        </a>
                                        <form th:action="@{/admin/products/delete/{id}(id=${product.id})}" method="post"
                                              onsubmit="return confirm('Opravdu chcete smazat tento produkt?')">
                                            <button type="submit" class="btn btn-outline-danger rounded-end-pill" title="Smazat">
                                                <i class="bi bi-trash"></i>
                                            </button>
                                        </form>
                                    </div>
                                </td>
                            </tr>
                            </tbody>
                        </table>
                    </div>
                </div>
            </div>
        </div>
    </div>
</div>

<footer th:replace="~{fragments/layout :: footer}"></footer>
<div th:replace="~{fragments/layout :: scripts}"></div>
</body>
</html>
